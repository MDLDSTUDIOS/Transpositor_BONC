<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transpositor Elite - BONC</title>
    <style>
        :root {
            --primary: #0BBDF4;
            --bg: #050505;
            --card-bg: rgba(30, 30, 35, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #0a1a20 0%, #000 100%);
            color: #fff;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .logo-text {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(11, 189, 244, 0.5);
            letter-spacing: 5px;
            margin-bottom: 15px;
            font-style: italic;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(11, 189, 244, 0.5); }
            to { text-shadow: 0 0 30px rgba(11, 189, 244, 0.8), 0 0 40px rgba(11, 189, 244, 0.4); }
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid rgba(11, 189, 244, 0.3);
            width: 92%;
            max-width: 370px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #fff !important;
            border-radius: 8px;
            color: #000 !important;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            outline: none;
        }

        .wheel-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--primary);
            padding: 5px;
        }

        .nav-btn {
            background: var(--primary);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn:active { transform: scale(0.9); opacity: 0.8; }

        .current-note-display {
            flex: 1;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
        }

        .res-box {
            background: rgba(11, 189, 244, 0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .res-box small { font-size: 0.6rem; color: var(--primary); display: block; margin-bottom: 5px; font-weight: bold;}
        .res-box span { font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--primary); }

        textarea {
            width: 100%; height: 70px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff; padding: 10px; font-size: 1rem;
            resize: none; outline: none;
        }

        textarea:focus { border-color: var(--primary); }

        .bulk-output {
            background: #000;
            border: 1px dashed var(--primary);
            padding: 12px; border-radius: 8px;
            font-size: 1.1rem; color: var(--primary);
            min-height: 45px; font-weight: bold;
            word-wrap: break-word;
        }

        .brand-footer { margin-top: 20px; text-align: center; }
        .sub-text { font-size: 0.6rem; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="logo-text">BONC</div>

<div class="main-card">
    <div class="input-group">
        <label>Instrumento de Origen:</label>
        <select id="from" onchange="updateUI()">
            <option value="4" selected>TROMPETA SIb</option>
            <option value="7">CLARINETE SIb</option>
            <option value="1">SAXOFÓN ALTO MIb</option>
            <option value="8">TUBA MIb</option>
            <option value="2">SAXOFÓN TENOR SIb</option>
            <option value="0">MELÓFONO FA</option>
            <option value="3">XILÓFONO DO</option>
            <option value="5">EUFONIO SIb</option>
            <option value="6">TUBA SIb</option>
        </select>
    </div>

    <div class="input-group">
        <label>Nota a Transponer:</label>
        <div class="wheel-nav">
            <button class="nav-btn" onclick="changeNote(-1)">❮</button>
            <div class="current-note-display" id="noteDisplay">DO</div>
            <button class="nav-btn" onclick="changeNote(1)">❯</button>
        </div>
    </div>

    <div class="res-box">
        <small id="targetLabel">PARA SAXOFÓN ALTO</small>
        <span id="resIndividual">RE</span>
    </div>

    <div class="input-group">
        <label>Frase Completa (Escribir):</label>
        <textarea id="bulkInput" placeholder="Ej: do re mi fa..." oninput="processBulk()"></textarea>
        <div class="bulk-output" id="bulkOutput">...</div>
    </div>

    <div class="input-group">
        <label>Transportar a:</label>
        <select id="to" onchange="updateUI()">
            <option value="1">SAXOFÓN ALTO MIb</option>
            <option value="8">TUBA MIb</option>
            <option value="4">TROMPETA SIb</option>
            <option value="7">CLARINETE SIb</option>
            <option value="2">SAXOFÓN TENOR SIb</option>
            <option value="0">MELÓFONO FA</option>
            <option value="3">XILÓFONO DO</option>
            <option value="6">TUBA SIb</option>
        </select>
    </div>
</div>

<div class="brand-footer">
    <span class="sub-text">BANDA ORQUESTA NUEVA CONCEPCIÓN</span>
</div>

<script>
    // Se mapea la columna 8 (Tuba MIb) igual que la columna 1 (Sax Alto) (HOLA, SOY ALEMANCIX) VIVA LA BONC
    const table = [
        ["DO", "RE", "SOL", "FA", "SOL", "SOL", "SOL", "SOL", "RE"],
        ["DO# / REB", "RE# / MIB", "SOL# / LAB", "FA# / SOLB", "SOL# / LAB", "SOL# / LAB", "SOL# / LAB", "SOL# / LAB", "RE# / MIB"],
        ["RE", "MI", "LA", "SOL", "LA", "LA", "LA", "LA", "MI"],
        ["RE# / MIB", "FA", "LA# / SIB", "SOL# / LAB", "LA# / SIB", "LA# / SIB", "LA# / SIB", "LA# / SIB", "FA"],
        ["MI", "FA# / SOLB", "SI", "LA", "SI", "SI", "SI", "SI", "FA# / SOLB"],
        ["FA", "SOL", "DO", "LA# / SIB", "DO", "DO", "DO", "DO", "SOL"],
        ["FA# / SOLB", "SOL# / LAB", "DO# / REB", "SI", "DO# / REB", "DO# / REB", "DO# / REB", "DO# / REB", "SOL# / LAB"],
        ["SOL", "LA", "RE", "DO", "RE", "RE", "RE", "RE", "LA"],
        ["SOL# / LAB", "LA# / SIB", "RE# / MIB", "DO# / REB", "RE# / MIB", "RE# / MIB", "RE# / MIB", "RE# / MIB", "LA# / SIB"],
        ["LA", "SI", "MI", "RE", "MI", "MI", "MI", "MI", "SI"],
        ["LA# / SIB", "DO", "FA", "RE# / MIB", "FA", "FA", "FA", "FA", "DO"],
        ["SI", "DO# / REB", "FA# / SOLB", "MI", "FA# / SOLB", "FA# / SOLB", "FA# / SOLB", "FA# / SOLB", "DO# / REB"]
    ];

    let currentIdx = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function clean(txt) { return txt.includes('/') ? txt.split('/')[0].trim() : txt; }

    function changeNote(dir) {
        currentIdx += dir;
        if (currentIdx > 11) currentIdx = 0;
        if (currentIdx < 0) currentIdx = 11;
        playTick();
        updateUI();
    }

    function updateUI() {
        const fromCol = document.getElementById('from').value;
        const toCol = document.getElementById('to').value;
        document.getElementById('noteDisplay').textContent = clean(table[currentIdx][fromCol]);
        document.getElementById('resIndividual').textContent = clean(table[currentIdx][toCol]);
        const name = document.getElementById('to').options[document.getElementById('to').selectedIndex].text;
        document.getElementById('targetLabel').textContent = `PARA ${name}`;
        processBulk();
    }

    function processBulk() {
        const input = document.getElementById('bulkInput').value.toUpperCase();
        const fromCol = parseInt(document.getElementById('from').value);
        const toCol = parseInt(document.getElementById('to').value);
        const output = document.getElementById('bulkOutput');
        if (!input.trim()) { output.textContent = "..."; return; }
        const userNotes = input.split(/[\s,/-]+/).filter(n => n.length > 0);
        const results = userNotes.map(n => {
            const idx = table.findIndex(r => r[fromCol].toUpperCase().split(' / ').includes(n));
            return idx !== -1 ? clean(table[idx][toCol]) : '?';
        });
        output.textContent = results.join("  ");
    }

    updateUI();
</script>
</body>
</html>
